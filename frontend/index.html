<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Task Tracker</title>
    <meta name="description" content="A simple dashboard to manage and track employee tasks.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <h1>Employee Task Tracker</h1>
            <p>Manage assignments efficiently</p>
        </header>

        <main class="main-content">
            <section class="card form-section">
                <h2>Add New Task</h2>
                <form id="task-form">
                    <div class="form-group">
                        <label for="employee">Employee Name</label>
                        <input type="text" id="employee" name="employee" placeholder="e.g. Jane Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="task">Task Description</label>
                        <input type="text" id="task" name="task" placeholder="e.g. Design homepage layout" required>
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status" required>
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Add Task</button>
                </form>
            </section>

            <section class="card table-section">
                <h2>Current Tasks</h2>
                <div class="table-responsive">
                    <table id="tasks-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Employee</th>
                                <th>Task</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tasks-body">
                            <!-- Tasks will be injected here by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
